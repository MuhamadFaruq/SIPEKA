name: sipeka
description: A personal finance management app for financial literacy
publish_to: 'none'
version: 1.0.0+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  sqflite: ^2.3.0
  path: ^1.8.3

  # OCR & Image Handling
  image_picker: ^1.0.4
  google_mlkit_text_recognition: ^0.11.0
  
  # State Management & Icons
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  intl: ^0.19.0
  provider: ^6.1.1 # Note: Kamu pakai Provider atau GetX? Di kodingan sebelumnya kita bahas GetX.
  
  # Persistence
  csv: ^6.0.0
  share_plus: ^7.2.2
  shared_preferences: ^2.2.2
  path_provider: ^2.1.2
  
  # UI & Charts
  fl_chart: ^1.1.1
  percent_indicator: ^4.2.5
  
  # Calculator Logic
  math_expressions: ^2.4.0

  # Utilities
  uuid: ^4.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/images/logo.png" # Sesuaikan dengan nama file logomu
  adaptive_icon_background: "#007AFF" # Warna background (opsional)
  adaptive_icon_foreground: "assets/images/logo.png"

flutter:
  uses-material-design: true