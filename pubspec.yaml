name: sipeka
description: A personal finance management app for financial literacy
publish_to: 'none'
version: 1.0.0+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  intl: ^0.19.0
  provider: ^6.1.1
  
  # Persistence
  csv: ^6.0.0
  share_plus: ^7.2.2
  shared_preferences: ^2.2.2
  path_provider: ^2.1.2
  
  # UI & Charts
  fl_chart: ^1.1.1
  image_picker: ^1.0.4
  
  # Calculator Logic
  math_expressions: ^2.4.0

  # Utilities
  uuid: ^4.2.1
  percent_indicator: ^4.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

