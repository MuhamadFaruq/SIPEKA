name: sipeka
description: A personal finance management app for financial literacy
publish_to: 'none'
version: 1.0.0+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  another_flushbar: ^1.12.3
  sqflite: ^2.4.1
  path: ^1.9.0

  # Firebase - Kunci di versi ini agar akur dengan ML Kit & Google Sign In
  # firebase_core: ^3.1.1
  # firebase_auth: ^5.1.1
  # cloud_firestore: ^5.0.2
  # google_sign_in: ^6.2.1

  # OCR & Image Handling
  image_picker: ^1.1.2
  # image_cropper: ^7.1.0
  image_cropper: ^12.2.1
  google_mlkit_text_recognition: ^0.15.0
  google_mlkit_commons: ^0.11.1

  # Persistence & Utilities
  csv: ^6.0.0
  share_plus: ^11.0.0              # Menghindari konflik library 'web'
  shared_preferences: ^2.3.2
  path_provider: ^2.1.5
  
  # UI & Charts
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  intl: ^0.19.0
  provider: ^6.1.2
  fl_chart: ^0.70.0
  percent_indicator: ^4.2.3
  math_expressions: ^2.6.0
  uuid: ^4.5.1

  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0

  local_auth: ^2.3.0
  flutter_timezone: ^5.0.2
  permission_handler: ^11.3.1
  # speech_to_text: ^6.6.2
  speech_to_text: ^7.0.0-beta.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/images/logo.png" # Sesuaikan dengan nama file logomu
  adaptive_icon_background: "#007AFF" # Warna background (opsional)
  adaptive_icon_foreground: "assets/images/logo.png"

flutter:
  uses-material-design: true